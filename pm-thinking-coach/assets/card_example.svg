<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1440" viewBox="0 0 1080 1440">
  <rect width="1080" height="1440" fill="#fbfaf5"/>
  <rect x="40" y="40" width="1000" height="1360" rx="18" fill="#ffffff" stroke="#d8deea" stroke-width="2"/>
  <circle cx="944" cy="104" r="18" fill="#b98236" opacity="0.18"/>
  <circle cx="986" cy="126" r="6" fill="#b98236" opacity="0.45"/>
  <line x1="72" y1="118" x2="176" y2="118" stroke="#b98236" stroke-width="5" stroke-linecap="round"/>
  <text x="72" y="168" font-size="54" font-weight="800" fill="#17233f">AI Agent信任</text>
  <text x="72" y="212" font-size="24" fill="#60708a">OpenAI / Anthropic / 产品实践</text>
  <line x1="72" y1="250" x2="1008" y2="250" stroke="#d8deea" stroke-width="2"/>
  <text x="72" y="300" font-size="22" font-weight="700" fill="#b98236">核心问题</text>
  <text x="72" y="355" font-size="43" font-weight="800" fill="#17233f">为什么用户愿意把关键工作流交给一个 AI Agent？</text>
  <text x="72" y="430" font-size="22" font-weight="700" fill="#b98236">资料入口</text>
<rect x="72" y="456" width="204" height="118" rx="8" fill="#f3efe4" stroke="#d8deea"/>
<text x="90" y="495" font-size="24" font-weight="700" fill="#17233f">OpenAI...</text>
<text x="90" y="532" font-size="21" font-weight="400" fill="#60708a">官方说明代理式编程场景</text>
<rect x="306" y="456" width="204" height="118" rx="8" fill="#f3efe4" stroke="#d8deea"/>
<text x="324" y="495" font-size="24" font-weight="700" fill="#17233f">Anthropic...</text>
<text x="324" y="532" font-size="21" font-weight="400" fill="#60708a">连接工具与上下文的协议</text>
<rect x="540" y="456" width="204" height="118" rx="8" fill="#f3efe4" stroke="#d8deea"/>
<text x="558" y="495" font-size="24" font-weight="700" fill="#17233f">Claude...</text>
<text x="558" y="532" font-size="21" font-weight="400" fill="#60708a">开发者工作流中的代理实践</text>
<rect x="774" y="456" width="204" height="118" rx="8" fill="#f3efe4" stroke="#d8deea"/>
<text x="792" y="495" font-size="24" font-weight="700" fill="#17233f">人人都是产品经理</text>
<text x="792" y="532" font-size="21" font-weight="400" fill="#60708a">中文产品拆解与需求视角</text>
  <line x1="72" y1="602" x2="1008" y2="602" stroke="#d8deea" stroke-width="2"/>
  <text x="72" y="642" font-size="22" font-weight="700" fill="#b98236">产品判断</text>
<rect x="72" y="676" width="288" height="196" rx="8" fill="#ffffff" stroke="#d8deea"/>
<text x="92" y="718" font-size="25" font-weight="700" fill="#17233f">产品表现</text>
<text x="92" y="760" font-size="22" font-weight="400" fill="#60708a">不只自动执行任务，还要让计</text>
<text x="92" y="790" font-size="22" font-weight="400" fill="#60708a">划、进度、失败原因可见。</text>
<rect x="384" y="676" width="288" height="196" rx="8" fill="#ffffff" stroke="#d8deea"/>
<text x="404" y="718" font-size="25" font-weight="700" fill="#17233f">市场需求</text>
<text x="404" y="760" font-size="22" font-weight="400" fill="#60708a">用户需要节省判断下一步的成</text>
<text x="404" y="790" font-size="22" font-weight="400" fill="#60708a">本，同时保留对关键节点的控</text>
<text x="404" y="820" font-size="22" font-weight="400" fill="#60708a">制。</text>
<rect x="696" y="676" width="288" height="196" rx="8" fill="#ffffff" stroke="#d8deea"/>
<text x="716" y="718" font-size="25" font-weight="700" fill="#17233f">产品价值</text>
<text x="716" y="760" font-size="22" font-weight="400" fill="#60708a">价值来自效率提升、信任积累</text>
<text x="716" y="790" font-size="22" font-weight="400" fill="#60708a">和工作流入口的长期占位。</text>
  <line x1="72" y1="910" x2="1008" y2="910" stroke="#d8deea" stroke-width="2"/>
  <text x="72" y="966" font-size="22" font-weight="700" fill="#b98236">关键洞察</text>
<text x="72" y="1008" font-size="25" font-weight="700" fill="#b98236">1.</text>
<text x="106" y="1008" font-size="25" font-weight="400" fill="#17233f">代理产品的核心不是炫技，而是可托付。</text>
<text x="72" y="1060" font-size="25" font-weight="700" fill="#b98236">2.</text>
<text x="106" y="1060" font-size="25" font-weight="400" fill="#17233f">失败可解释，比一次性成功更能建立信任。</text>
<text x="72" y="1112" font-size="25" font-weight="700" fill="#b98236">3.</text>
<text x="106" y="1112" font-size="25" font-weight="400" fill="#17233f">越关键的流程，越需要用户可随时接管。</text>
  <rect x="72" y="1190" width="936" height="134" rx="10" fill="#f3efe4" stroke="#d8deea"/>
<text x="102" y="1230" font-size="22" font-weight="700" fill="#b98236">给自己的追问</text>
<text x="102" y="1284" font-size="24" font-weight="700" fill="#b98236">1.</text>
<text x="136" y="1284" font-size="23" font-weight="400" fill="#17233f">用户真正害怕失去什么控制</text>
<text x="136" y="1315" font-size="23" font-weight="400" fill="#17233f">权？</text>
<text x="404" y="1284" font-size="24" font-weight="700" fill="#b98236">2.</text>
<text x="438" y="1284" font-size="23" font-weight="400" fill="#17233f">哪一步必须让用户确认？</text>
<text x="706" y="1284" font-size="24" font-weight="700" fill="#b98236">3.</text>
<text x="740" y="1284" font-size="23" font-weight="400" fill="#17233f">哪个指标证明信任在增长？</text>
  <text x="72" y="1372" font-size="20" fill="#60708a">完整链接请见正文资料入口 | 产品表现 + 市场需求 = 产品价值</text>
</svg>
